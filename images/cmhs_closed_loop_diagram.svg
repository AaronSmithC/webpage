<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 660" role="img" aria-labelledby="title desc">
  <title id="title">CMHS closed-loop hygiene cycle</title>
  <desc id="desc">A closed loop: clean water and soap are delivered to the body inside a sealed hygiene enclosure, directed airflow guides the droplets to a continuous recovery system, and the water is filtered and reclaimed back into delivery — nothing free-floating in the cabin.</desc>
  <defs>
    <marker id="aBlue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4da3ff"/>
    </marker>
    <style>
      text{font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;fill:#c9d1d9;}
      .hd{font-weight:700;fill:#e6edf3;letter-spacing:.5px;}
      .sub{fill:#8b949e;}
      .acc{fill:#4da3ff;}
      .accb{fill:#4da3ff;font-weight:700;letter-spacing:.4px;}
      .node{fill:#111827;stroke:#2a3650;stroke-width:1.5;}
      .encl{fill:#0e1626;stroke:#4da3ff;stroke-width:2;}
      .flow{stroke:#4da3ff;stroke-width:2.5;fill:none;}
      .air{stroke:#5b87c4;stroke-width:1.6;fill:none;}
    </style>
  </defs>

  <!-- header -->
  <text class="hd" x="32" y="38" font-size="21">CLOSED-LOOP HYGIENE CYCLE &#8212; CMHS</text>
  <text class="sub" x="33" y="61" font-size="13">Water delivered, captured, reclaimed, and reused &#8212; a sealed loop, nothing free-floating.</text>

  <!-- ===== loop flow arrows (clockwise) ===== -->
  <path class="flow" d="M624 158 Q 792 196 836 340" marker-end="url(#aBlue)"/>
  <path class="flow" d="M838 410 Q 792 556 626 596" marker-end="url(#aBlue)"/>
  <path class="flow" d="M374 600 Q 208 558 160 412" marker-end="url(#aBlue)"/>
  <path class="flow" d="M162 340 Q 208 196 374 156" marker-end="url(#aBlue)"/>
  <!-- water markers on the loop -->
  <circle cx="772" cy="206" r="4" fill="#4da3ff"/>
  <circle cx="772" cy="546" r="4" fill="#4da3ff"/>
  <circle cx="228" cy="546" r="4" fill="#4da3ff"/>
  <circle cx="228" cy="206" r="4" fill="#4da3ff"/>
  <!-- closure label on the return leg -->
  <text class="acc" x="252" y="232" font-size="11" text-anchor="middle">reclaimed water returns</text>

  <!-- ===== center: hygiene enclosure ===== -->
  <text class="hd" x="500" y="288" font-size="14" text-anchor="middle">HYGIENE ENCLOSURE</text>
  <rect class="encl" x="402" y="298" width="196" height="160" rx="16"/>
  <text class="sub" x="500" y="318" font-size="10" text-anchor="middle">sealed &#183; airflow-controlled</text>
  <!-- figure -->
  <circle cx="500" cy="350" r="13" fill="none" stroke="#c9d1d9" stroke-width="2"/>
  <rect x="489" y="364" width="22" height="64" rx="10" fill="none" stroke="#c9d1d9" stroke-width="2"/>
  <!-- wearable interface band -->
  <rect x="481" y="398" width="38" height="13" rx="3" fill="#4da3ff"/>
  <!-- directed airflow inside enclosure (downward) -->
  <path class="air" d="M444 320 v92" marker-end="url(#aBlue)"/>
  <path class="air" d="M556 320 v92" marker-end="url(#aBlue)"/>
  <text class="sub" x="500" y="500" font-size="11" text-anchor="middle">wearable interface &#8212; docks to suction &amp; recovery</text>

  <!-- ===== node 1 · delivery (top) ===== -->
  <rect class="node" x="380" y="117" width="240" height="66" rx="12"/>
  <text class="accb" x="500" y="146" font-size="13" text-anchor="middle">1 &#183; WATER &amp; SOAP DELIVERY</text>
  <text class="sub" x="500" y="164" font-size="10.5" text-anchor="middle">contact applicators &#183; no free spray</text>

  <!-- ===== node 2 · airflow (right) ===== -->
  <rect class="node" x="720" y="342" width="240" height="66" rx="12"/>
  <text class="accb" x="840" y="371" font-size="13" text-anchor="middle">2 &#183; DIRECTED AIRFLOW</text>
  <text class="sub" x="840" y="389" font-size="10.5" text-anchor="middle">becomes &#8220;down&#8221; &#183; carries droplets in</text>

  <!-- ===== node 3 · recovery (bottom) ===== -->
  <rect class="node" x="380" y="567" width="240" height="66" rx="12"/>
  <text class="accb" x="500" y="596" font-size="13" text-anchor="middle">3 &#183; CONTINUOUS RECOVERY</text>
  <text class="sub" x="500" y="614" font-size="10.5" text-anchor="middle">immediate suction &#183; nothing escapes</text>

  <!-- ===== node 4 · reclamation (left) ===== -->
  <rect class="node" x="40" y="342" width="240" height="66" rx="12"/>
  <text class="accb" x="160" y="371" font-size="13" text-anchor="middle">4 &#183; FILTRATION &amp; RECLAMATION</text>
  <text class="sub" x="160" y="389" font-size="10.5" text-anchor="middle">water cleaned and returned</text>
</svg>
